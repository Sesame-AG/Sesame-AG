# 最简无报错版：只保留手动打包dev分支，无任何tag校验、无语法坑
name: Release Build

# 只留手动触发，语法绝对不会错
on:
  workflow_dispatch:

# 固定环境，不依赖tag
env:
  CI: "true"
  JAVA_DISTRIBUTION: "oracle"
  JAVA_VERSION: "17.0.1"
  ANDROID_API_LEVEL: "36"
  ANDROID_BUILD_TOOLS: "36.0.0"
  LOCAL_GRADLE_VERSION: "9.4.0-milestone-3"
  LOCAL_AGP_VERSION: "9.0.1"
  LOCAL_KOTLIN_VERSION: "2.2.10"
  RELEASE_DIR: app/build/outputs/apk/release

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      # 强制拉取dev分支
      - name: Checkout dev branch
        uses: actions/checkout@v4
        with:
          ref: dev
          fetch-depth: 0

      # 配置Java环境
      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17.0.1'
          distribution: 'oracle'
          cache: gradle

      # 给打包权限
      - name: Grant execute permission
        run: chmod +x gradlew

      # 直接打包Release包
      - name: Build Release APK
        run: ./gradlew assembleRelease --stacktrace

      # 上传APK
      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: AG-Dev-Release-APK
          path: app/build/outputs/apk/release/app-arm64-v8a-release.apk
