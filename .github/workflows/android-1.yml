name: Release Build
run-name: Release Build - ${{ github.ref_name }}

on:
  push:
    tags:
      - "*"                     # 任意 tag 均可，建议格式如 v1.0.0
  workflow_dispatch:

env:
  CI: "true"
  JAVA_DISTRIBUTION: "oracle"
  JAVA_VERSION: "17.0.1"
  ANDROID_API_LEVEL: "36"
  ANDROID_BUILD_TOOLS: "36.0.0"
  LOCAL_GRADLE_VERSION: "9.4.0-milestone-3"
  LOCAL_AGP_VERSION: "9.0.1"
  LOCAL_KOTLIN_VERSION: "2.2.10"
  RELEASE_DIR: app/build/outputs/apk/release
  STAGING_DIR: app/build/outputs/apk/all
  ASSET_DIR: app/build/outputs/apk/release-assets
  ARTIFACT_PASSWORD: Sesame-AG
  RELEASE_TAG_RAW: ${{ github.ref_name }}

concurrency:
  group: release-${{ github.ref_name }}
  cancel-in-progress: false

jobs:
  build-and-sign:
    runs-on: ubuntu-latest
    permissions:
      contents: read

    steps:
      - name: Set Timezone to Asia/Shanghai
        run: sudo timedatectl set-timezone Asia/Shanghai

      - name: Checkout (disable submodules)
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          ref: ${{ github.ref }}
          submodules: false          # 避免 .gitmodules 错误

      - name: Validate Project Toolchain Baseline
        shell: bash
        run: |
          set -euo pipefail
          grep -Eq '^distributionUrl=.*gradle-'"${LOCAL_GRADLE_VERSION//./\\.}"'-bin\.zip$' gradle/wrapper/gradle-wrapper.properties
          grep -Eq '^android-plugin = "'"${LOCAL_AGP_VERSION//./\\.}"'"$' gradle/libs.versions.toml
          grep -Eq '^kotlin = "'"${LOCAL_KOTLIN_VERSION//./\\.}"'"$' gradle/libs.versions.toml
          grep -Eq '^appVersion=.+' gradle.properties
          grep -Eq 'compileSdk = '"${ANDROID_API_LEVEL}"'$' app/build.gradle.kts
          grep -Eq 'sourceCompatibility = JavaVersion.VERSION_17' app/build.gradle.kts
          grep -Eq 'targetCompatibility = JavaVersion.VERSION_17' app/build.gradle.kts
          echo "✅ Toolchain validation passed"

      - name: Set up JDK
        uses: actions/setup-java@v5
        with:
          distribution: ${{ env.JAVA_DISTRIBUTION }}
          java-version: ${{ env.JAVA_VERSION }}
          architecture: x64
          cache: gradle

      - name: Set up Android SDK
        uses: android-actions/setup-android@v3
        with:
          packages: ""

      - name: Install Android SDK packages
        shell: bash
        run: |
          sdkmanager --install \
            "platform-tools" \
            "platforms;android-${ANDROID_API_LEVEL}" \
            "build-tools;${ANDROID_BUILD_TOOLS}"
          set +o pipefail
          yes | sdkmanager --licenses >/dev/null
          set -o pipefail

      - name: Set up Gradle
        uses: gradle/actions/setup-gradle@v4
        with:
          cache-read-only: false
          gradle-version: wrapper

      - name: Grant execute permission for gradlew
        run: chmod +x gradlew

      - name: Build Release APK (unsigned)
        shell: bash
        run: |
          ./gradlew --no-daemon --stacktrace assembleRelease

      - name: Stage unsigned APKs
        shell: bash
        run: |
          rm -rf "${STAGING_DIR}" "${ASSET_DIR}"
          mkdir -p "${STAGING_DIR}"
          mapfile -t apks < <(find "${RELEASE_DIR}" -maxdepth 1 -type f -name "*.apk" | sort)
          if [[ ${#apks[@]} -eq 0 ]]; then
            echo "No release APKs found in ${RELEASE_DIR}" >&2
            exit 1
          fi
          for apk in "${apks[@]}"; do
            cp "${apk}" "${STAGING_DIR}/"
          done

      - name: Sign APKs
        id: sign_apks
        uses: ilharp/sign-android-release@v2
        with:
          releaseDir: ${{ env.STAGING_DIR }}
          signingKey: ${{ secrets.ANDROID_SIGNING_KEY }}
          keyAlias: ${{ secrets.ANDROID_KEY_ALIAS }}
          keyStorePassword: ${{ secrets.ANDROID_KEYSTORE_PASSWORD }}
          keyPassword: ${{ secrets.ANDROID_KEY_PASSWORD }}
          buildToolsVersion: ${{ env.ANDROID_BUILD_TOOLS }}

      - name: Prepare final assets (signed APKs + checksums)
        id: prepare_assets
        shell: bash
        run: |
          mkdir -p "${ASSET_DIR}"
          IFS=':' read -r -a files <<< "${{ steps.sign_apks.outputs.signedFiles }}"
          copied=0
          for file in "${files[@]}"; do
            [[ -n "${file}" ]] || continue
            cp "${file}" "${ASSET_DIR}/"
            (cd "${ASSET_DIR}" && sha256sum "$(basename "${file}")" > "CHECKSUMS-$(basename "${file}").sha256")
            copied=$((copied + 1))
          done
          if [[ ${copied} -eq 0 ]]; then
            echo "No signed APKs were produced" >&2
            exit 1
          fi
          echo "asset_dir=${ASSET_DIR}" >> "$GITHUB_OUTPUT"

      - name: Package signed APKs as ZIP (password protected)
        id: package_artifact
        shell: bash
        run: |
          artifact_path="${RUNNER_TEMP}/Sesame-AG-${RELEASE_TAG_RAW}.zip"
          (cd "${ASSET_DIR}" && zip -r -P "${ARTIFACT_PASSWORD}" "${artifact_path}" .)
          echo "artifact_path=${artifact_path}" >> "$GITHUB_OUTPUT"

      - name: Upload artifact
        uses: actions/upload-artifact@v7
        with:
          name: Sesame-AG-${{ github.ref_name }}
          path: ${{ steps.package_artifact.outputs.artifact_path }}
          if-no-files-found: error
